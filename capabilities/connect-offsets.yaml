naftiko: 1.0.0-alpha2
info:
  label: Debezium Kafka Connect REST API — Offsets
  description: 'Debezium Kafka Connect REST API — Offsets. 3 operations. Lead operation: Get connector offsets. Self-contained
    Naftiko capability covering one Debezium business surface.'
  tags:
  - Debezium
  - Offsets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBEZIUM_API_KEY: DEBEZIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-offsets
    baseUri: http://localhost:8083
    description: Debezium Kafka Connect REST API — Offsets business capability. Self-contained, no shared references.
    resources:
    - name: connectors-connector-offsets
      path: /connectors/{connector}/offsets
      operations:
      - name: getconnectoroffsets
        method: GET
        description: Get connector offsets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector
          in: path
          type: string
          required: true
      - name: alteroffsets
        method: PATCH
        description: Alter connector offsets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: resetoffsets
        method: DELETE
        description: Reset connector offsets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: connect-offsets-rest
    port: 8080
    description: REST adapter for Debezium Kafka Connect REST API — Offsets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/connectors/{connector}/offsets
      name: connectors-connector-offsets
      description: REST surface for connectors-connector-offsets.
      operations:
      - method: GET
        name: getconnectoroffsets
        description: Get connector offsets
        call: connect-offsets.getconnectoroffsets
        with:
          connector: rest.connector
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: alteroffsets
        description: Alter connector offsets
        call: connect-offsets.alteroffsets
        with:
          connector: rest.connector
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: resetoffsets
        description: Reset connector offsets
        call: connect-offsets.resetoffsets
        with:
          connector: rest.connector
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-offsets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debezium Kafka Connect REST API — Offsets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-connector-offsets
      description: Get connector offsets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-offsets.getconnectoroffsets
      with:
        connector: tools.connector
      outputParameters:
      - type: object
        mapping: $.
    - name: alter-connector-offsets
      description: Alter connector offsets
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-offsets.alteroffsets
      with:
        connector: tools.connector
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: reset-connector-offsets
      description: Reset connector offsets
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: connect-offsets.resetoffsets
      with:
        connector: tools.connector
      outputParameters:
      - type: object
        mapping: $.

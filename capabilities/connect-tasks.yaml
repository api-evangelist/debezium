naftiko: 1.0.0-alpha2
info:
  label: Debezium Kafka Connect REST API — Tasks
  description: 'Debezium Kafka Connect REST API — Tasks. 3 operations. Lead operation: List connector tasks. Self-contained
    Naftiko capability covering one Debezium business surface.'
  tags:
  - Debezium
  - Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBEZIUM_API_KEY: DEBEZIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-tasks
    baseUri: http://localhost:8083
    description: Debezium Kafka Connect REST API — Tasks business capability. Self-contained, no shared references.
    resources:
    - name: connectors-connector-tasks
      path: /connectors/{connector}/tasks
      operations:
      - name: listtasks
        method: GET
        description: List connector tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector
          in: path
          type: string
          required: true
    - name: connectors-connector-tasks-task-restart
      path: /connectors/{connector}/tasks/{task}/restart
      operations:
      - name: restarttask
        method: POST
        description: Restart task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector
          in: path
          type: string
          required: true
        - name: task
          in: path
          type: integer
          required: true
    - name: connectors-connector-tasks-task-status
      path: /connectors/{connector}/tasks/{task}/status
      operations:
      - name: gettaskstatus
        method: GET
        description: Get task status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector
          in: path
          type: string
          required: true
        - name: task
          in: path
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: connect-tasks-rest
    port: 8080
    description: REST adapter for Debezium Kafka Connect REST API — Tasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/connectors/{connector}/tasks
      name: connectors-connector-tasks
      description: REST surface for connectors-connector-tasks.
      operations:
      - method: GET
        name: listtasks
        description: List connector tasks
        call: connect-tasks.listtasks
        with:
          connector: rest.connector
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connectors/{connector}/tasks/{task}/restart
      name: connectors-connector-tasks-task-restart
      description: REST surface for connectors-connector-tasks-task-restart.
      operations:
      - method: POST
        name: restarttask
        description: Restart task
        call: connect-tasks.restarttask
        with:
          connector: rest.connector
          task: rest.task
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connectors/{connector}/tasks/{task}/status
      name: connectors-connector-tasks-task-status
      description: REST surface for connectors-connector-tasks-task-status.
      operations:
      - method: GET
        name: gettaskstatus
        description: Get task status
        call: connect-tasks.gettaskstatus
        with:
          connector: rest.connector
          task: rest.task
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debezium Kafka Connect REST API — Tasks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-connector-tasks
      description: List connector tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-tasks.listtasks
      with:
        connector: tools.connector
      outputParameters:
      - type: object
        mapping: $.
    - name: restart-task
      description: Restart task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-tasks.restarttask
      with:
        connector: tools.connector
        task: tools.task
      outputParameters:
      - type: object
        mapping: $.
    - name: get-task-status
      description: Get task status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-tasks.gettaskstatus
      with:
        connector: tools.connector
        task: tools.task
      outputParameters:
      - type: object
        mapping: $.
